description = "Level 4: Aladip vacuum FEP/TI — perturbed bonded terms at lambda=0.125"
level = 4
natoms = 12
isolates = "perturbed quartic bond + cos-harmonic angle + improper + proper dihedral (NTG=1, RLAM=0.125, NLAM=1)"

[input]
topology = "../shared/aladip.topo"
configuration = "../aladip_vacuum/aladip_vacuum.conf"
parameters = "aladip_vacuum_fep.in"
